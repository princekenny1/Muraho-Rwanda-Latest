# First-time bootstrap config for Certbot HTTP-01 challenge
# Use this only to issue initial certificates, then switch back to production.conf

server {
    listen 80;
    listen [::]:80;
    server_name muraho.rw www.muraho.rw;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    location / {
        return 200 "Certbot bootstrap active";
        add_header Content-Type text/plain;
    }
}
